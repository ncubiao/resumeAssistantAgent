[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
# 默认不跑 eval（需真实 LLM）：要跑用 `pytest -m eval -v`
addopts = "-v -m 'not eval'"
markers = [
    "eval: 端到端质量评测，需要真实 LLM Key（pytest -m eval 显式触发）",
]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
